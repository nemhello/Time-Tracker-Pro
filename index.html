<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e40af"> 
    <title>Time Tracker Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <div id="app">
        <header>
            <h1>⏱️ Time Tracker Pro</h1>
            <div id="currentDate"></div>
        </header>

        <div id="activeTimer" class="hidden">
            <div class="active-card">
                <div class="location-name" id="activeLocation"></div>
                <div class="charge-code" id="activeChargeCode"></div>
                <a id="activeAddress" class="active-address" href="#" target="_blank"></a>
                <div class="timer-display" id="timerDisplay">00:00:00</div>
                <input type="text" id="workOrderField" class="work-order-field" placeholder="Work Order # (optional)">
                <textarea id="notesField" class="notes-field" placeholder="Add notes (optional)..."></textarea>
                <button id="stopBtn" class="btn btn-danger">STOP</button>
            </div>
        </div>

        <!-- LOCATION LOG VIEW -->
        <div id="locationLogView" class="hidden">
            <div class="log-header">
                <button id="backFromLogBtn" class="btn-back">← Back</button>
                <h2>Location Log</h2>
            </div>
            <div class="log-sms-bar">
                <input type="tel" id="smsPhoneInput" class="sms-phone-input" placeholder="Phone number">
                <button id="smsLogBtn" class="btn-sms">📱 SMS</button>
            </div>
            <button id="clearLogBtn" class="btn-clear-log">🗑 Clear Log</button>
            <div id="locationLogList"></div>
        </div>

        <div id="globalSearchSection">
            <div class="search-header">
                <button id="clearSearchBtn" class="btn-back hidden">← Back</button>
                <input type="text" id="globalSearchBox" placeholder="Search all locations..." class="search-box">
            </div>
            <div id="globalSearchResults" class="location-list hidden"></div>
        </div>

        <div id="categorySelection">
            <div class="category-list">
                <div class="gps-log-bar">
                    <button id="viewLogBtn" class="btn-view-log">
                        <div class="category-name">📋 View Log</div>
                        <div class="category-count">History &amp; SMS</div>
                    </button>
                    <button id="logLocationBtn" class="btn-log-location">
                        <div class="category-name">📍 Log My Location</div>
                        <div class="category-count">Tap to record GPS</div>
                    </button>
                </div>
                <div id="gpsStatus" class="gps-status hidden"></div>
            </div>
            <div id="categoryList" class="category-list"></div>
        </div>

        <div id="locationSelection" class="hidden">
            <button id="backBtn" class="btn-back">← Back to Categories</button>
            <div id="locationList" class="location-list"></div>
        </div>

        <div id="locationDetails" class="hidden">
            <button id="backFromDetailsBtn" class="btn-back">← Back</button>
            <div class="details-card">
                <div class="details-location" id="detailsLocation"></div>
                <div class="details-code" id="detailsChargeCode"></div>
                <div id="detailsAddress" class="details-address"></div>
                <div class="details-buttons">
                    <button class="btn btn-email" onclick="emailDispatchStart()">📧 Email Dispatch to Start</button>
                    <button class="btn btn-primary" onclick="confirmStartTimer()">▶ Start Timer</button>
                </div>
            </div>
        </div>

        <div id="todaySection">
            <h2>Today's Entries</h2>
            <div id="entriesList"></div>
            <div id="totalHours"></div>
            <button id="viewPastBtn" class="btn btn-secondary">📅 View Past Entries</button>
            <button id="viewBackupsBtn" class="btn btn-secondary">🔄 Auto-Backups</button>
            <button id="exportDataBtn" class="btn btn-secondary">💾 Export Backup</button>
            <button id="importDataBtn" class="btn btn-secondary">📂 Import Backup</button>
            <div id="backupStatus" class="backup-status hidden"></div>
        </div>

        <div id="backupView" class="hidden">
            <button id="backFromBackupsBtn" class="btn-back">← Back to Today</button>
            <h2>Auto-Backups</h2>
            <p class="backup-description">Backups are saved automatically at the end of each day. Last 7 days are kept on this device.</p>
            <div id="backupList"></div>
        </div>
        
        <div id="calendarView" class="hidden">
            <button id="backFromCalendarBtn" class="btn-back">← Back to Today</button>
            <h2>Past Entries</h2>
            <div class="past-search-section">
                <input type="text" id="pastSearchBox" placeholder="Search past entries..." class="search-box" oninput="searchPastEntries()">
            </div>
            <div id="pastSearchResults" class="hidden"></div>
            <div id="calendarContainer"></div>
            <div id="pastEntriesDetail" class="hidden">
                <h3 id="selectedDateTitle"></h3>
                <div id="selectedDateEntries"></div>
            </div>
        </div>
        
        <div id="codeModal" class="modal hidden">
            <div class="modal-content">
                <h3>Which code to use?</h3>
                <button id="useSZCode" class="btn btn-primary code-btn">
                    <div class="code-label">SZ Code</div>
                    <div class="code-value" id="szCodeValue"></div>
                </button>
                <button id="useMOSCode" class="btn btn-primary code-btn">
                    <div class="code-label">MOS Code</div>
                    <div class="code-value" id="mosCodeValue"></div>
                </button>
                <button id="skipEmailBtn" class="btn btn-secondary" style="margin-top: 8px; display:none;">Skip Email &amp; Finish</button>
                <button id="cancelCodeModal" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
        
        <!-- Persistent photo inputs - survive iOS camera reload -->
        <input type="file" id="photoCameraInput" accept="image/*" capture="environment" style="display:none;">
        <input type="file" id="photoFileInput" accept="image/*" style="display:none;">

        <div class="site-link"><a href="https://nemhello.github.io/Time-Tracker-Pro/" target="_blank">nemhello.github.io/Time-Tracker-Pro</a></div>
        <div class="version">v4.6.0</div>
    </div>

    <script src="locations.js"></script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>
</html>
